name: onsei_organizer
description: Onsei Organizer - Audio file management tool
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  grpc: ^5.1.0
  protobuf: ^6.0.0
  file_selector: ^1.0.0
  dropdown_search: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.0

flutter:
  uses-material-design: true
  fonts:
    - family: SarasaUiSC
      fonts:
        - asset: fonts/SarasaUiSC-Regular.ttf